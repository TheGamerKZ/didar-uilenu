/* ---------- Calendar ---------- */
function buildCalendar(t, lang){
  const d = new Date(CONFIG.weddingDateISO);
  const year = d.getFullYear();
  const month = d.getMonth();
  const targetDate = d.getDate();
  const firstDay = new Date(year, month, 1);
  let startOffset = firstDay.getDay();
  startOffset = (startOffset === 0) ? 6 : startOffset - 1;
  const daysInMonth = new Date(year, month+1, 0).getDate();

  let html = `<div class="cal-month">${t.months[month]} ${year}</div><div class="cal-grid">`;
  t.dows.forEach(dow=>{ html += `<div class="dow">${dow}</div>`; });
  for(let i=0;i<startOffset;i++){ html += `<div class="day empty"></div>`; }
  for(let day=1; day<=daysInMonth; day++){
    const marked = (day === targetDate) ? 'marked' : '';
    html += `<div class="day ${marked}">${day}</div>`;
  }
  const timesLine = CONFIG.events.map(ev => `${ev.label[lang]} — ${ev.time}`).join(' &nbsp;•&nbsp; ');
  html += `</div><div class="cal-time">${timesLine}</div>`;
  document.getElementById('calendar').innerHTML = html;
}

/* ---------- Countdown ---------- */
function startCountdown(){
  if(countdownInterval) clearInterval(countdownInterval);
  function update(){
    const target = new Date(CONFIG.weddingDateISO).getTime();
    const now = new Date().getTime();
    let diff = target - now;
    if(diff < 0) diff = 0;
    const days = Math.floor(diff/(1000*60*60*24));
    const hours = Math.floor((diff/(1000*60*60))%24);
    const mins = Math.floor((diff/(1000*60))%60);
    const dEl = document.getElementById('cd-days');
    const hEl = document.getElementById('cd-hours');
    const mEl = document.getElementById('cd-mins');
    if(dEl) dEl.textContent = String(days).padStart(2,'0');
    if(hEl) hEl.textContent = String(hours).padStart(2,'0');
    if(mEl) mEl.textContent = String(mins).padStart(2,'0');
  }
  update();
  countdownInterval = setInterval(update, 30000);
}

/* ---------- Scroll reveal ---------- */
function setupReveal(skipAnimation){
  if(revealObserver) revealObserver.disconnect();
  const elements = document.querySelectorAll('.reveal');
  if(skipAnimation){
    elements.forEach(el => el.classList.add('visible'));
    return;
  }
  revealObserver = new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        entry.target.classList.add('visible');
        revealObserver.unobserve(entry.target);
      }
    });
  }, { threshold: 0.15, rootMargin: '0px 0px -40px 0px' });
  elements.forEach(el => revealObserver.observe(el));
}

/* ---------- Language switch ---------- */
function attachLangSwitch(){
  document.querySelectorAll('.lang-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const newLang = btn.dataset.lang;
      if(newLang === currentLang) return;
      const wrap = document.getElementById('pageWrap');
      const scrollY = window.scrollY;
      wrap.classList.add('fading');
      setTimeout(()=>{
        renderApp(newLang, { skipAnimation: true });
        window.scrollTo(0, scrollY);
      }, 280);
    });
  });
}

/* ---------- Music control ---------- */
function setupMusic(){
  const btn = document.getElementById('musicBtn');
  const audio = document.getElementById('bgMusic');
  if(!btn || !audio) return;

  // Если музыка уже должна играть (например, после переключения языка)
  if(isMusicPlaying){
    audio.play().then(() => {
      btn.classList.add('playing');
    }).catch(() => {
      isMusicPlaying = false;
      btn.classList.remove('playing');
    });
  }

  btn.addEventListener('click', ()=>{
    if(!isMusicPlaying){
      audio.play().then(()=>{
        isMusicPlaying = true;
        btn.classList.add('playing');
      }).catch(err=>{ 
        console.log("Браузер заблокировал автовоспроизведение, но клик должен это исправить:", err); 
      });
    } else {
      audio.pause();
      isMusicPlaying = false;
      btn.classList.remove('playing');
    }
  });
}
   
/* ---------- Init ---------- */
renderApp(currentLang); // Запускаем приложение (оно само внутри вызовет setupMusic)
</script>
</body>
