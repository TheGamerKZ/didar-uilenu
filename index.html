    position:relative; width:100%; height:340px; overflow:hidden;
    background:
      radial-gradient(circle at 30% 20%, var(--cream-deep) 0%, transparent 55%),
      radial-gradient(circle at 75% 75%, #EFDFC0 0%, transparent 50%),
      linear-gradient(160deg, var(--cream-deep), var(--cream) 70%);
  }
  .hero-photo img{
    position:absolute; inset:0; width:100%; height:100%; object-fit:cover;
    filter:saturate(.92);
  }
  .hero-photo .ph-frame-icon{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  }
  .hero-photo::after{
    content:""; position:absolute; inset:0;
    background:linear-gradient(180deg, rgba(43,35,32,0) 45%, var(--cream) 96%);
  }
  .hero-body{
    position:relative; padding:26px 28px 56px; margin-top:-46px;
  }
  .eyebrow{
    font-family:var(--sans); font-size:12px; letter-spacing:.22em; text-transform:uppercase;
    color:var(--maroon); font-weight:600; margin-bottom:18px;
  }
  .names{
    font-family:var(--serif);
    font-size:56px; line-height:1.05; font-weight:500;
    color:var(--ink);
  }
  .names .amp{
    display:block; font-family:var(--script); color:var(--gold); font-size:34px; margin:6px 0;
  }
  .wed-date{
    margin-top:22px; font-family:var(--sans); font-size:15px; letter-spacing:.12em;
    color:var(--ink-soft);
  }

  /* ---------- Events (Беташар / Той) ---------- */
  .events-row{display:flex; gap:14px; justify-content:center; margin-top:10px; flex-wrap:wrap;}
  .event-card{
    background:#fff; border:1px solid var(--line); border-radius:14px;
    padding:22px 28px; min-width:130px; box-shadow:0 4px 14px rgba(43,35,32,.06);
  }
  .event-label{font-size:12px; letter-spacing:.1em; text-transform:uppercase; color:var(--maroon); font-weight:600;}
  .event-time{font-family:var(--serif); font-size:34px; color:var(--ink); font-weight:600; margin-top:8px;}

  /* ---------- Photo panel (inline photo block) ---------- */
  .photo-panel{
    position:relative; width:100%; aspect-ratio:4/5; border-radius:16px; overflow:hidden;
    background:
      radial-gradient(circle at 30% 20%, var(--cream-deep) 0%, transparent 55%),
      radial-gradient(circle at 75% 75%, #EFDFC0 0%, transparent 50%),
      linear-gradient(160deg, var(--cream-deep), var(--cream) 70%);
    box-shadow:0 10px 30px rgba(43,35,32,.1);
  }
  .photo-panel img{width:100%; height:100%; object-fit:cover; display:block;}
  .photo-panel .ph-frame-icon{position:absolute; inset:0; display:flex; align-items:center; justify-content:center;}

  /* ---------- Sections ---------- */
  section{padding:48px 28px; text-align:center; position:relative;}
  section + section{border-top:1px solid var(--line);}
  h2{
    font-family:var(--serif); font-weight:600; font-size:26px; margin-bottom:16px; color:var(--maroon);
  }
  h3{ font-family:var(--serif); font-weight:600; font-size:20px; margin:6px 0 14px;}
  p{ font-family:var(--sans); font-size:15px; line-height:1.7; color:var(--ink-soft); max-width:420px; margin:0 auto;}

  .hosts-label{font-size:13px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-soft); margin-top:26px;}
  .hosts-names{font-family:var(--serif); font-size:22px; margin-top:6px; color:var(--ink);}

  /* ---------- Countdown ---------- */
  .countdown{display:flex; justify-content:center; gap:14px; margin-top:8px; flex-wrap:wrap;}
  .cd-box{
    background:#fff; border:1px solid var(--line); border-radius:10px;
    min-width:76px; padding:16px 10px;
  }
  .cd-num{font-family:var(--serif); font-size:32px; color:var(--maroon); font-weight:600;}
  .cd-label{font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-soft); margin-top:4px;}

  /* ---------- Calendar ---------- */
  .cal{max-width:320px; margin:20px auto 0; background:#fff; border:1px solid var(--line); border-radius:12px; padding:18px;}
  .cal-month{font-family:var(--serif); font-size:18px; margin-bottom:12px; color:var(--ink);}
  .cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:6px; font-size:12px;}
  .cal-grid .dow{color:var(--ink-soft); font-weight:600; padding-bottom:4px;}
  .cal-grid .day{padding:6px 0; border-radius:6px; color:var(--ink);}
  .cal-grid .day.empty{visibility:hidden;}
  .cal-grid .day.marked{background:var(--maroon); color:#fff; font-weight:700;}
  .cal-time{margin-top:16px; font-family:var(--serif); font-size:22px; color:var(--gold); letter-spacing:.04em;}

  /* ---------- Venue ---------- */
  .map-btn{
    display:inline-block; margin-top:18px; padding:12px 28px;
    border:1px solid var(--maroon); color:var(--maroon); text-decoration:none;
    font-size:13px; letter-spacing:.08em; text-transform:uppercase; border-radius:30px;
    transition:background .2s, color .2s;
  }
  .map-btn:hover{background:var(--maroon); color:#fff;}

  /* ---------- Footer ---------- */
  .footer{padding:56px 28px 44px; text-align:center; background:var(--cream-deep);}
  .footer .names{font-size:38px;}
  .footer .farewell{font-family:var(--script); font-size:26px; color:var(--gold); margin-top:10px;}
  .footer .made{margin-top:30px; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-soft);}

  @media(max-width:420px){
    .names{font-size:42px;}
    .footer .names{font-size:30px;}
  }
  @media (prefers-reduced-motion: reduce){ *{transition:none !important;} }
</style>

<div class="wrap">

  <!-- HERO -->
  <div class="hero">
    <div class="hero-photo">
      ${CONFIG.heroPhotoUrl
        ? `<img src="${CONFIG.heroPhotoUrl}" alt="${CONFIG.groomName} & ${CONFIG.brideName}">`
        : `<div class="ph-frame-icon">${heartOrnamentSVG()}</div>`}
    </div>
    <div class="hero-body">
      <div class="eyebrow reveal">Үйлену тойына шақыру</div>
      <div class="names reveal r-scale">${CONFIG.groomName}<span class="amp">&amp;</span>${CONFIG.brideName}</div>
      <div class="wed-date reveal">${CONFIG.weddingDateDisplay}</div>
      <div class="ornament reveal">${ornamentSVG()}</div>
    </div>
  </div>

  <!-- INVITATION -->
  <section>
    <div class="bg-pattern"></div>
    <div class="reveal">
      <h2>${CONFIG.invitationTitle}</h2>
      <p>${CONFIG.invitationText}</p>
      <div class="hosts-label">${CONFIG.hostsLabel}</div>
      <div class="hosts-names">${CONFIG.hostsNames}</div>
    </div>
  </section>

  <!-- PHOTO: middle -->
  <section style="padding-top:10;">
    <div class="photo-panel reveal r-scale">
      ${CONFIG.midPhotoUrl
        ? `<img src="${CONFIG.midPhotoUrl}" alt="${CONFIG.groomName} & ${CONFIG.brideName}">`
        : `<div class="ph-frame-icon">${heartOrnamentSVG()}</div>`}
    </div>
  </section>

  <!-- EVENTS -->
  <section>
    <div class="reveal">
      <h3>Той бағдарламасы</h3>
      <div class="events-row">
        ${CONFIG.events.map(ev => `
          <div class="event-card">
            <div class="event-label">${ev.label}</div>
            <div class="event-time">${ev.time}</div>
          </div>`).join('')}
      </div>
    </div>
  </section>

  <!-- COUNTDOWN -->
  <section>
    <div class="reveal">
      <h3>Тойға қалды</h3>
      <div class="countdown">
        <div class="cd-box"><div class="cd-num" id="cd-days">00</div><div class="cd-label">Күн</div></div>
        <div class="cd-box"><div class="cd-num" id="cd-hours">00</div><div class="cd-label">Сағат</div></div>
        <div class="cd-box"><div class="cd-num" id="cd-mins">00</div><div class="cd-label">Минут</div></div>
      </div>
    </div>
  </section>

  <!-- CALENDAR -->
  <section>
    <div class="cal reveal r-scale" id="calendar"></div>
  </section>

  <!-- VENUE -->
  <section>
    <div class="reveal">
      <h2>Мекенжайымыз</h2>
      <h3>${CONFIG.venueName}</h3>
      <p>${CONFIG.venueAddress}</p>
      <a class="map-btn" href="${CONFIG.mapLink}" target="_blank" rel="noopener">Картадан көрсету</a>
    </div>
  </section>

  <!-- PHOTO: bottom -->
  <section>
    <div class="photo-panel reveal r-scale">
      ${CONFIG.bottomPhotoUrl
        ? `<img src="${CONFIG.bottomPhotoUrl}" alt="${CONFIG.groomName} & ${CONFIG.brideName}">`
        : `<div class="ph-frame-icon">${heartOrnamentSVG()}</div>`}
    </div>
  </section>

  <!-- FOOTER -->
  <div class="footer">
    <div class="reveal">
      <div class="names">${CONFIG.groomName} &amp; ${CONFIG.brideName}</div>
      <div class="farewell">${CONFIG.farewellText}</div>
      <div class="wed-date" style="margin-top:8px;">${CONFIG.weddingDateDisplay}</div>
      <div class="made">Made with love for you</div>
    </div>
  </div>

</div>
`;

/* ---------- Ornament SVG (qoshqar-muyiz inspired) ---------- */
function ornamentSVG(){
  return `<svg viewBox="0 0 200 40" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M100 20 C 92 4, 70 4, 66 18 C 63 28, 74 32, 80 24 C 84 18, 78 14, 74 18" stroke="#B8892E" stroke-width="1.6" stroke-linecap="round"/>
    <path d="M100 20 C 108 4, 130 4, 134 18 C 137 28, 126 32, 120 24 C 116 18, 122 14, 126 18" stroke="#B8892E" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="0" y1="20" x2="55" y2="20" stroke="#D8B463" stroke-width="1"/>
    <line x1="145" y1="20" x2="200" y2="20" stroke="#D8B463" stroke-width="1"/>
    <circle cx="100" cy="20" r="3.5" fill="#7A2331"/>
  </svg>`;
}

/* ---------- Photo placeholder ornaments ---------- */
function heartOrnamentSVG(){
  return `<svg width="90" height="90" viewBox="0 0 90 90" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="45" cy="45" r="43" stroke="#D8B463" stroke-width="1.2" stroke-dasharray="2 5"/>
    <path d="M45 60 C 30 48, 22 38, 22 29 C 22 20, 30 15, 37 20 C 40 22, 43 26, 45 30 C 47 26, 50 22, 53 20 C 60 15, 68 20, 68 29 C 68 38, 60 48, 45 60 Z"
      stroke="#B8892E" stroke-width="1.6" fill="none"/>
  </svg>`;
}

/* ---------- Countdown ---------- */
function updateCountdown(){
  const target = new Date(CONFIG.weddingDateISO).getTime();
  const now = new Date().getTime();
  let diff = target - now;
  if(diff < 0) diff = 0;
  const days = Math.floor(diff/(1000*60*60*24));
  const hours = Math.floor((diff/(1000*60*60))%24);
  const mins = Math.floor((diff/(1000*60))%60);
  document.getElementById('cd-days').textContent = String(days).padStart(2,'0');
  document.getElementById('cd-hours').textContent = String(hours).padStart(2,'0');
  document.getElementById('cd-mins').textContent = String(mins).padStart(2,'0');
}
updateCountdown();
setInterval(updateCountdown, 30000);

/* ---------- Calendar ---------- */
function buildCalendar(){
  const d = new Date(CONFIG.weddingDateISO);
  const year = d.getFullYear();
  const month = d.getMonth();
  const targetDate = d.getDate();
  const monthNames = ["Қаңтар","Ақпан","Наурыз","Сәуір","Мамыр","Маусым","Шілде","Тамыз","Қыркүйек","Қазан","Қараша","Желтоқсан"];
  const firstDay = new Date(year, month, 1);
  let startOffset = firstDay.getDay(); // 0=Sun
  startOffset = (startOffset === 0) ? 6 : startOffset - 1; // make Monday=0
  const daysInMonth = new Date(year, month+1, 0).getDate();

  let html = `<div class="cal-month">${monthNames[month]} ${year}</div><div class="cal-grid">`;
  ["Дс","Сс","Ср","Бс","Жм","Сн","Жс"].forEach(dow=>{ html += `<div class="dow">${dow}</div>`; });
  for(let i=0;i<startOffset;i++){ html += `<div class="day empty"></div>`; }
  for(let day=1; day<=daysInMonth; day++){
    const marked = (day === targetDate) ? 'marked' : '';
    html += `<div class="day ${marked}">${day}</div>`;
  }
  const timesLine = CONFIG.events.map(ev => `${ev.label} — ${ev.time}`).join(' &nbsp;•&nbsp; ');
  html += `</div><div class="cal-time" style="font-size:16px;">${timesLine}</div>`;
  document.getElementById('calendar').innerHTML = html;
}
buildCalendar();

/* ---------- Плавное появление блоков при прокрутке ---------- */
const revealObserver = new IntersectionObserver((entries)=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add('visible');
      revealObserver.unobserve(entry.target);
    }
  });
}, { threshold: 0.15, rootMargin: '0px 0px -40px 0px' });

document.querySelectorAll('.reveal, .reveal-stagger').forEach(el=>{
  revealObserver.observe(el);
});
</script>
